apiVersion: apps/v1
kind: Deployment
metadata:
  name: secure-fastapi
  labels:
    app: secure-fastapi

spec:
  replicas: 2

  selector:
    matchLabels:
      app: secure-fastapi

  template:
    metadata:
      labels:
        app: secure-fastapi

    spec:
      containers:
        - name: secure-fastapi

          image: 036890309295.dkr.ecr.eu-west-2.amazonaws.com/secure-fastapi:latest

          ports:
            - containerPort: 80

          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "500m"
              memory: "256Mi"

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10